; BeatSync 耳机端 PlatformIO 配置
; Platform: Seeed XIAO ESP32C3

[env:xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    sparkfun/SparkFun ICM-42688-P Arduino Library @ ^1.0.0
    dfrobot/DFRobotDFPlayerMini @ ^1.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=0
