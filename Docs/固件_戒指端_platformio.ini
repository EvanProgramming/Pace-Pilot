; BeatSync 戒指端 PlatformIO 配置
; Platform: Seeed XIAO nRF52840

[env:xiao_nrf52840]
platform = nordicnrf52
board = seeed_xiao_nrf52840
framework = arduino

monitor_speed = 115200
upload_speed = 115200

lib_deps =
    sparkfun/SparkFun ICM-42688-P Arduino Library @ ^1.0.0
    adafruit/Adafruit BluefruitLE nRF51 @ ^1.1.0

build_flags =
    -DCORE_DEBUG_LEVEL=0
